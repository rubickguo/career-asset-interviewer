<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{NAME}} - Technical Builder</title>
  <style>
    :root { --ink:#e8eef4; --muted:#9aa8b5; --accent:#7dd3fc; --bg:#0e1117; --panel:#151b23; --line:#263241; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); line-height:1.6; }
    main { max-width:1080px; margin:0 auto; padding:44px 24px; }
    header { padding:64px 0; }
    h1 { margin:0 0 14px; font-size:54px; line-height:1.08; letter-spacing:0; }
    h2 { margin:44px 0 16px; font-size:24px; letter-spacing:0; }
    a { color:var(--accent); }
    .lead { max-width:760px; color:var(--muted); font-size:18px; }
    .terminal { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:18px; font-family:"SFMono-Regular",Consolas,monospace; }
    .project { display:grid; grid-template-columns:1fr 220px; gap:18px; margin-top:16px; border:1px solid var(--line); border-radius:14px; padding:18px; background:var(--panel); }
    .stack { color:var(--accent); font-family:"SFMono-Regular",Consolas,monospace; font-size:14px; }
    @media (max-width:760px){ h1{font-size:38px}.project{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="terminal">$ whoami<br>{{POSITIONING}}</div>
      <h1>{{NAME}}</h1>
      <p class="lead">{{BUILDER_SUMMARY}}</p>
    </header>
    <section>
      <h2>Shipped Work</h2>
      <article class="project"><div><h3>{{PROJECT_TITLE}}</h3><p>{{PROJECT_ACTION_RESULT}}</p></div><div class="stack">{{STACK_AND_LINKS}}</div></article>
    </section>
    <section><h2>Engineering Judgment</h2><p>{{TECHNICAL_DECISIONS_AND_TRADEOFFS}}</p></section>
    <section><h2>Contact</h2><p>{{CONTACT}}</p></section>
  </main>
</body>
</html>
