<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{NAME}} - Product Portfolio</title>
  <style>
    :root { --ink:#20242c; --muted:#667085; --accent:#ff6f61; --soft:#fff4ef; --line:#eadfd9; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:#fffaf7; line-height:1.6; }
    main { max-width:1120px; margin:0 auto; padding:48px 24px; }
    header { min-height:72vh; display:grid; align-content:center; gap:24px; }
    h1 { margin:0; max-width:820px; font-size:64px; line-height:1.05; letter-spacing:0; }
    h2 { margin:56px 0 18px; font-size:28px; letter-spacing:0; }
    p { margin:0 0 14px; }
    .lead { max-width:720px; color:var(--muted); font-size:21px; }
    .tags { display:flex; flex-wrap:wrap; gap:10px; }
    .tag { padding:8px 12px; border-radius:999px; background:var(--soft); color:var(--accent); font-weight:700; }
    .project-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
    .project { border:1px solid var(--line); border-radius:18px; padding:22px; background:#fff; }
    .project h3 { margin:0 0 10px; font-size:22px; letter-spacing:0; }
    .story { color:var(--muted); }
    @media (max-width:760px){ h1{font-size:42px}.project-grid{grid-template-columns:1fr} header{min-height:auto;padding:48px 0} }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="tags"><span class="tag">{{KEYWORD_1}}</span><span class="tag">{{KEYWORD_2}}</span><span class="tag">{{KEYWORD_3}}</span></div>
      <h1>{{NAME}}</h1>
      <p class="lead">{{POSITIONING}}</p>
    </header>
    <section>
      <h2>Product Stories</h2>
      <div class="project-grid">
        <article class="project"><h3>{{PROJECT_TITLE}}</h3><p class="story">{{USER_PROBLEM}}</p><p>{{PROJECT_ACTION_RESULT}}</p></article>
        <article class="project"><h3>{{PROJECT_TITLE_2}}</h3><p class="story">{{USER_INSIGHT}}</p><p>{{PROJECT_ACTION_RESULT_2}}</p></article>
      </div>
    </section>
    <section><h2>How I Think</h2><p>{{PRODUCT_TASTE_AND_METHOD}}</p></section>
    <section><h2>Contact</h2><p>{{CONTACT}}</p></section>
  </main>
</body>
</html>
