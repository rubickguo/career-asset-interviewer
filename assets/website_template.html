<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personal Website</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --bg: #f7f8fa;
      --paper: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.6;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 24px;
    }
    header {
      padding-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    h2 {
      margin: 40px 0 16px;
      font-size: 22px;
      letter-spacing: 0;
    }
    h3 {
      margin: 24px 0 8px;
      font-size: 18px;
      letter-spacing: 0;
    }
    p { margin: 0 0 12px; }
    .subhead {
      max-width: 720px;
      color: var(--muted);
      font-size: 18px;
    }
    .keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }
    .keyword {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--paper);
      color: var(--accent);
      font-size: 14px;
    }
    section {
      padding: 8px 0;
    }
    .project {
      border-top: 1px solid var(--line);
      padding-top: 20px;
      margin-top: 20px;
    }
    a { color: var(--accent); }
    @media (max-width: 640px) {
      main { padding: 36px 18px; }
      h1 { font-size: 32px; }
      .subhead { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>{{NAME}}</h1>
      <p class="subhead">{{POSITIONING}}</p>
      <div class="keywords">
        <span class="keyword">{{KEYWORD_1}}</span>
        <span class="keyword">{{KEYWORD_2}}</span>
        <span class="keyword">{{KEYWORD_3}}</span>
      </div>
    </header>
    <section>
      <h2>Featured Projects</h2>
      <article class="project">
        <h3>{{PROJECT_TITLE}}</h3>
        <p>{{PROJECT_CONTEXT}}</p>
        <p>{{PROJECT_ACTION_RESULT}}</p>
      </article>
    </section>
    <section>
      <h2>About</h2>
      <p>{{ABOUT}}</p>
    </section>
    <section>
      <h2>Contact</h2>
      <p>{{CONTACT}}</p>
    </section>
  </main>
</body>
</html>
